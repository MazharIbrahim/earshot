# Render blueprint — connect this repo and Render reads this to provision
# everything in one click. https://render.com/docs/blueprint-spec

services:
  - type: web
    name: earshot-backend
    runtime: node
    region: oregon         # or 'frankfurt' if your users are EU-heavy
    plan: free             # upgrade to 'starter' before launch (no cold starts)
    rootDir: backend
    # ffmpeg comes from the ffmpeg-static npm package — bundled prebuilt
    # binary, no apt-get required (Render's non-root runtime can't sudo).
    # Build the PWA into ../web/dist so the backend can serve it; this
    # lets a single Render service host both api + app under one origin.
    buildCommand: |
      npm ci
      cd ../web && npm ci && npm run build
    startCommand: node src/server.js
    healthCheckPath: /healthz
    autoDeploy: true

    envVars:
      # 20.x LTS — newer Node breaks AWS SDK v3 deprecation warnings into
      # hard errors and Render's default jumps to 24 unless pinned.
      - key: NODE_VERSION
        value: 20.20.2
      - key: PORT
        value: 8787

      # Storage (set these in Render dashboard, mark as secret)
      - key: EARSHOT_STORAGE
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: earshot-takes
      - key: R2_PUBLIC_BASE
        sync: false

      # Database
      - key: EARSHOT_DB
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # Disable the dev tunnel in production
      - key: EARSHOT_TUNNEL
        value: "off"
